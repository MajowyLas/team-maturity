services:
  - type: web
    name: team-maturity-assessment
    runtime: docker
    plan: starter  # "starter" needed for persistent disk; "free" has no disk support
    disk:
      name: maturity-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_PATH
        value: /data/maturity.db
      - key: APP_PASSWORD
        sync: false  # set manually in Render dashboard
