<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Maturity Assessment{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0',
                            300: '#86efac', 400: '#4ade80', 500: '#4CB648',
                            600: '#3d9c3a', 700: '#2d7a2a', 800: '#1f5e1d',
                            900: '#14532d',
                        },
                        accent: {
                            50: '#fff5f5', 100: '#ffe3e3', 200: '#ffc9c9',
                            300: '#ffa8a8', 400: '#ff6b6b', 500: '#FF0000',
                            600: '#e60000', 700: '#cc0000',
                        },
                        hub: {
                            bg: '#FFFFFF',
                            surface: '#FFFFFF',
                            card: '#FFFFFF',
                            hover: '#F5F5F5',
                            border: '#000000',
                            border2: '#000000',
                            text: '#000000',
                            muted: '#555555',
                            faint: '#888888',
                        },
                    },
                    borderRadius: {
                        'none': '0px',
                        'sm': '0px',
                        DEFAULT: '0px',
                        'md': '0px',
                        'lg': '0px',
                        'xl': '0px',
                        '2xl': '0px',
                        '3xl': '0px',
                        'full': '0px',
                    },
                    boxShadow: {
                        'soft': 'none',
                        'card': 'none',
                        'card-hover': 'none',
                        'glow': 'none',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'fade-in-up': 'fadeInUp 0.3s ease-out',
                        'slide-down': 'slideDown 0.2s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-4px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                }
            }
        }
    </script>
    <script>
        // Chart.js defaults — white brutal
        Chart.defaults.color = '#000000';
        Chart.defaults.borderColor = 'rgba(0, 0, 0, 0.15)';
    </script>
</head>
<body class="h-full font-sans" style="background: #FFFFFF; color: #000000;">
    <!-- Navigation -->
    <nav style="border-bottom: 3px solid #000;" class="sticky top-0 z-50 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14">
                <div class="flex items-center space-x-8">
                    <a href="/" class="flex items-center space-x-2">
                        <span class="font-black text-lg tracking-tight uppercase">Maturity_</span>
                    </a>
                    <div class="hidden sm:flex sm:space-x-1">
                        <a href="/dashboard" class="px-3 py-2 text-sm font-bold text-hub-muted hover:text-black uppercase tracking-wide transition-colors duration-150">
                            Team
                        </a>
                        <a href="/engineering/dashboard/view" class="px-3 py-2 text-sm font-bold text-hub-muted hover:text-black uppercase tracking-wide transition-colors duration-150">
                            Engineering
                        </a>
                        <a href="/admin" class="px-3 py-2 text-sm font-bold text-hub-muted hover:text-black uppercase tracking-wide transition-colors duration-150">
                            Admin
                        </a>
                    </div>
                </div>
                {% if auth_enabled %}
                <a href="/logout" class="px-3 py-2 text-sm font-bold text-hub-faint hover:text-accent-500 uppercase tracking-wide transition-colors duration-150">
                    Sign Out
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 animate-fade-in">
        {% block content %}{% endblock %}
    </main>

    <script></script>
    <script src="/static/charts.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
