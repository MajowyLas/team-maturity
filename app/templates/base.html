<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Maturity Assessment{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/trend-chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca', 800: '#3730a3',
                            900: '#312e81',
                        },
                        accent: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca',
                        },
                        good: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0',
                            500: '#22c55e', 600: '#16a34a',
                        },
                        warn: {
                            50: '#fff7ed', 100: '#ffedd5',
                            500: '#f97316', 600: '#ea580c',
                        },
                        bad: {
                            50: '#fef2f2', 100: '#fee2e2',
                            500: '#ef4444', 600: '#dc2626',
                        },
                        hub: {
                            bg: '#f8fafc',
                            surface: '#ffffff',
                            card: '#ffffff',
                            hover: '#f1f5f9',
                            border: '#e2e8f0',
                            border2: '#cbd5e1',
                            text: '#0f172a',
                            muted: '#64748b',
                            faint: '#94a3b8',
                        },
                    },
                    boxShadow: {
                        'soft': '0 1px 2px rgba(0,0,0,0.04)',
                        'card': '0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06)',
                        'card-hover': '0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04)',
                        'glow': '0 0 0 3px rgba(99,102,241,0.15)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'fade-in-up': 'fadeInUp 0.3s ease-out',
                        'slide-down': 'slideDown 0.2s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-4px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                }
            }
        }
    </script>
    <script>
        // Chart.js defaults — clean minimal
        Chart.defaults.color = '#334155';
        Chart.defaults.borderColor = 'rgba(0, 0, 0, 0.06)';
        Chart.defaults.plugins.tooltip.cornerRadius = 8;
        Chart.defaults.plugins.tooltip.padding = 10;
    </script>
</head>
<body class="min-h-screen flex flex-col font-sans bg-hub-bg text-hub-text">
    {% block nav %}
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white border-b border-hub-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-8">
                    <a href="/" class="flex items-center">
                        <span class="font-bold text-lg text-hub-text tracking-tight">Maturity</span>
                    </a>
                    <div class="flex items-center gap-1">
                        <a href="/dashboard" class="nav-link px-3 py-1.5 text-sm font-medium text-hub-muted hover:text-hub-text hover:bg-hub-hover rounded-lg transition-all duration-150">
                            Team
                        </a>
                        <a href="/engineering/dashboard/view" class="nav-link px-3 py-1.5 text-sm font-medium text-hub-muted hover:text-hub-text hover:bg-hub-hover rounded-lg transition-all duration-150">
                            Delivery
                        </a>
                        <a href="/admin" class="nav-link px-3 py-1.5 text-sm font-medium text-hub-muted hover:text-hub-text hover:bg-hub-hover rounded-lg transition-all duration-150">
                            Admin
                        </a>
                    </div>
                </div>
                <div class="flex items-center">
                    {% if auth_enabled %}
                    <a href="/logout" class="px-3 py-1.5 text-sm font-medium text-hub-faint hover:text-hub-muted rounded-lg transition-colors duration-150">
                        Sign Out
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    {% endblock %}

    <!-- Main content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fade-in w-full">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-hub-border mt-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex items-center justify-between">
            <span class="text-xs text-hub-faint">Built for DataFeedWatch</span>
            <span class="text-xs text-hub-faint">Maturity Assessment Tool</span>
        </div>
    </footer>

    <script>
        // Nav active state
        (function() {
            const path = window.location.pathname;
            document.querySelectorAll('nav .nav-link').forEach(link => {
                const href = link.getAttribute('href');
                if (href === '/') return;
                if (path.startsWith(href)) {
                    link.classList.remove('text-hub-muted');
                    link.classList.add('text-brand-600', 'bg-brand-50', 'font-semibold');
                }
            });
        })();
    </script>
    <script src="/static/charts.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
