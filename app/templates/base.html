<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Maturity Assessment{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0',
                            300: '#86efac', 400: '#4ade80', 500: '#4CB648',
                            600: '#3d9c3a', 700: '#2d7a2a', 800: '#1f5e1d',
                            900: '#14532d',
                        },
                        accent: {
                            50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff',
                            300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7',
                            600: '#9333ea', 700: '#7e22ce',
                        },
                        navy: {
                            800: '#1e3a5f', 900: '#0f2440',
                        },
                        hub: {
                            bg: '#0f1117',
                            surface: '#161922',
                            card: '#1a1d2e',
                            hover: '#232738',
                            border: '#2a2e3f',
                            border2: '#363b50',
                            text: '#e4e5e9',
                            muted: '#8b8fa3',
                            faint: '#5d6179',
                        },
                    },
                    boxShadow: {
                        'soft': '0 1px 3px 0 rgb(0 0 0 / 0.12), 0 1px 2px -1px rgb(0 0 0 / 0.1)',
                        'card': '0 4px 6px -1px rgb(0 0 0 / 0.15), 0 2px 4px -2px rgb(0 0 0 / 0.1)',
                        'card-hover': '0 10px 15px -3px rgb(0 0 0 / 0.2), 0 4px 6px -4px rgb(0 0 0 / 0.15)',
                        'glow': '0 0 20px rgb(168 85 247 / 0.08)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'fade-in-up': 'fadeInUp 0.5s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                }
            }
        }
    </script>
    <script>
        // Apply dark theme to Chart.js defaults
        Chart.defaults.color = '#8b8fa3';
        Chart.defaults.borderColor = 'rgba(42, 46, 63, 0.5)';
    </script>
</head>
<body class="h-full font-sans" style="background: #0f1117; color: #e4e5e9;">
    <!-- Navigation -->
    <nav class="bg-hub-surface border-b border-hub-border sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14">
                <div class="flex items-center space-x-8">
                    <a href="/" class="flex items-center space-x-2 group">
                        <span class="text-xl group-hover:scale-110 transition-transform duration-200">📊</span>
                        <span class="font-bold text-white text-lg tracking-tight">Team Maturity</span>
                    </a>
                    <div class="hidden sm:flex sm:space-x-1">
                        <a href="/dashboard" class="px-3 py-2 rounded-lg text-sm font-medium text-hub-muted hover:text-hub-text hover:bg-hub-hover transition-all duration-200">
                            Team Maturity
                        </a>
                        <a href="/engineering/dashboard/view" class="px-3 py-2 rounded-lg text-sm font-medium text-hub-muted hover:text-hub-text hover:bg-hub-hover transition-all duration-200">
                            Engineering Maturity
                        </a>
                        <a href="/admin" class="px-3 py-2 rounded-lg text-sm font-medium text-hub-muted hover:text-hub-text hover:bg-hub-hover transition-all duration-200">
                            Admin
                        </a>
                    </div>
                </div>
                {% if auth_enabled %}
                <a href="/logout" class="px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-red-400 hover:bg-red-500/10 transition-all duration-200">
                    Sign Out
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 animate-fade-in">
        {% block content %}{% endblock %}
    </main>

    <script></script>
    <script src="/static/charts.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
