<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login -- Team Maturity Assessment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        accent: {
                            50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff',
                            300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7',
                            600: '#9333ea', 700: '#7e22ce',
                        },
                        hub: {
                            bg: '#0f1117',
                            surface: '#161922',
                            card: '#1a1d2e',
                            hover: '#232738',
                            border: '#2a2e3f',
                            border2: '#363b50',
                            text: '#e4e5e9',
                            muted: '#8b8fa3',
                            faint: '#5d6179',
                        },
                    },
                }
            }
        }
    </script>
    <style>
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
        }
    </style>
</head>
<body class="h-full font-sans flex items-center justify-center" style="background: #0f1117; color: #e4e5e9;">
    <div class="w-full max-w-sm mx-auto px-6 animate-fade-in-up">
        <div class="text-center mb-8">
            <span class="text-4xl">📊</span>
            <h1 class="text-2xl font-bold text-hub-text mt-3 tracking-tight">Team Maturity</h1>
            <p class="text-sm text-hub-muted mt-1">Enter the password to continue</p>
        </div>

        <form method="POST" action="/login" class="bg-hub-card rounded-2xl shadow-lg border border-hub-border p-8">
            <input type="hidden" name="next" value="{{ next_url }}">

            {% if error %}
            <div class="mb-4 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/30 text-sm text-red-400">
                Incorrect password. Please try again.
            </div>
            {% endif %}

            <div class="mb-6">
                <label class="block text-sm font-medium text-hub-text mb-2">Password</label>
                <input type="password" name="password" required autofocus
                       placeholder="Enter shared password"
                       class="w-full rounded-xl border border-hub-border2 bg-hub-surface text-hub-text px-4 py-3 text-sm
                              transition-all duration-200">
            </div>

            <button type="submit"
                    class="w-full px-4 py-3 bg-accent-600 text-white rounded-xl text-sm font-semibold
                           hover:bg-accent-700 active:scale-[0.97]
                           shadow-sm hover:shadow-md transition-all duration-200">
                Sign In
            </button>
        </form>

        <p class="text-center text-xs text-hub-faint mt-6">
            Ask your admin for the password if you don't have it.
        </p>
    </div>
</body>
</html>
