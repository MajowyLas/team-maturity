<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login -- Team Maturity Assessment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out; }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #000;
            border-color: #000;
        }
    </style>
</head>
<body class="h-full font-sans flex items-center justify-center" style="background: #FFF; color: #000; font-family: Inter, sans-serif;">
    <div class="w-full max-w-sm mx-auto px-6 animate-fade-in-up">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black uppercase tracking-tight">Maturity_</h1>
            <p class="text-sm text-gray-500 mt-2">Enter the password to continue</p>
        </div>

        <form method="POST" action="/login" style="border: 3px solid #000; padding: 2rem;">
            <input type="hidden" name="next" value="{{ next_url }}">

            {% if error %}
            <div class="mb-4 px-4 py-3 text-sm font-bold text-white" style="background: #FF0000;">
                Incorrect password. Please try again.
            </div>
            {% endif %}

            <div class="mb-6">
                <label class="block text-xs font-bold uppercase tracking-wide mb-2">Password</label>
                <input type="password" name="password" required autofocus
                       placeholder="Enter shared password"
                       style="border: 2px solid #000; padding: 0.75rem 1rem; width: 100%; font-size: 0.875rem;">
            </div>

            <button type="submit"
                    style="width: 100%; padding: 0.75rem; background: #000; color: #FFF; font-weight: 900; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; border: 2px solid #000; cursor: pointer;"
                    onmouseover="this.style.background='#FF0000'; this.style.borderColor='#FF0000';"
                    onmouseout="this.style.background='#000'; this.style.borderColor='#000';">
                Sign In
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-6">
            Ask your admin for the password if you don't have it.
        </p>
    </div>
</body>
</html>
