<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login -- Team Maturity Assessment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0',
                            500: '#4CB648', 600: '#3d9c3a', 700: '#2d7a2a',
                        }
                    },
                }
            }
        }
    </script>
    <style>
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
    </style>
</head>
<body class="h-full font-sans flex items-center justify-center">
    <div class="w-full max-w-sm mx-auto px-6 animate-fade-in-up">
        <div class="text-center mb-8">
            <span class="text-4xl">📊</span>
            <h1 class="text-2xl font-bold text-gray-900 mt-3 tracking-tight">Team Maturity</h1>
            <p class="text-sm text-gray-500 mt-1">Enter the password to continue</p>
        </div>

        <form method="POST" action="/login" class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
            <input type="hidden" name="next" value="{{ next_url }}">

            {% if error %}
            <div class="mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-sm text-red-700">
                Incorrect password. Please try again.
            </div>
            {% endif %}

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" name="password" required autofocus
                       placeholder="Enter shared password"
                       class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm
                              focus:ring-2 focus:ring-brand-500 focus:border-brand-500
                              transition-all duration-200">
            </div>

            <button type="submit"
                    class="w-full px-4 py-3 bg-brand-600 text-white rounded-xl text-sm font-semibold
                           hover:bg-brand-700 active:scale-[0.97]
                           shadow-sm hover:shadow-md transition-all duration-200">
                Sign In
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-6">
            Ask your admin for the password if you don't have it.
        </p>
    </div>
</body>
</html>
