{% extends "base_public.html" %}
{% block title %}Thank You -- Engineering Delivery Assessment{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center py-20">
    <div class="text-6xl mb-6" style="animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);">🎉</div>
    <h1 class="text-3xl font-bold text-gray-900 mb-4 animate-fade-in-up tracking-tight">Thank You!</h1>
    <p class="text-gray-600 mb-8 animate-fade-in-up" style="animation-delay: 0.1s;">Your engineering delivery assessment has been recorded. You can close this page.</p>
    <div class="animate-fade-in-up" style="animation-delay: 0.2s;">
        <a href="/engineering/{{ token }}" class="px-6 py-2.5 bg-white border border-gray-200 rounded-xl text-gray-700 font-medium hover:bg-gray-50 hover:border-gray-300 hover:shadow-soft active:scale-[0.97] transition-all duration-200">
            Submit Another Response
        </a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Confetti on page load
    (function() {
        const colors = ['#4CB648', '#3B82F6', '#facc15', '#ef4444', '#c084fc', '#f97316'];
        const container = document.createElement('div');
        container.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden';
        document.body.appendChild(container);
        for (let i = 0; i < 80; i++) {
            const dot = document.createElement('div');
            const size = Math.random() * 10 + 4;
            const x = Math.random() * 100;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const isRect = Math.random() > 0.5;
            dot.style.cssText = `position:absolute;top:-20px;left:${x}%;width:${size}px;height:${isRect ? size*2 : size}px;background:${color};border-radius:${isRect?'2px':'50%'};opacity:1;`;
            dot.animate([
                { transform: `translateY(0) rotate(0deg) scale(1)`, opacity: 1 },
                { transform: `translateY(${window.innerHeight + 100}px) rotate(${Math.random()*1080-540}deg) scale(${Math.random()*0.5+0.5})`, opacity: 0 }
            ], {
                duration: Math.random() * 2000 + 2000,
                easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                delay: Math.random() * 600
            });
            container.appendChild(dot);
        }
        setTimeout(() => container.remove(), 4000);
    })();
</script>
{% endblock %}
